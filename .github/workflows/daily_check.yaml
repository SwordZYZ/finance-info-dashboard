name: Daily Dividend Rate Fetcher

on:
  schedule:
    - cron: '00 11 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  run-script:
    runs-on: self-hosted
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强行开启 Node.js 24 兼容模式，消除警告

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # 显式传入 GitHub Token，防止你的 NAS 容器在 git push 时遭遇权限拦截
        token: ${{ secrets.RUNNER_PUSH_TOKEN }}

    - name: Setup uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "latest"

    - name: Run Python Script
      run: |
        # 使用你已经迁移成功的 uv 包管理器优雅运行
        uv run main.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add 930955indicator.xlsx data.json
        # 只有在文件有变动时才提交，避免无意义的构建报错
        git diff-index --quiet HEAD || git commit -m "Update daily indicator data"
        git push origin main